workflows:
  expo-ios-unsigned:
    name: Expo iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install pnpm
        script: |
          # pnpm kurulumu
          curl -fsSL https://get.pnpm.io/install.sh | sh -
          export PNPM_HOME="$HOME/Library/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          echo "export PNPM_HOME=\"$HOME/Library/pnpm\"" >> $CM_ENV
          echo "export PATH=\"$PNPM_HOME:\$PATH\"" >> $CM_ENV
          
      - name: Install dependencies
        script: |
          # Corepack'in 'Yarn kullanmak zorundasın' engellemesini kapatıyoruz
          export COREPACK_ENABLE_STRICT=0
          echo "export COREPACK_ENABLE_STRICT=0" >> $CM_ENV
          
          # pnpm kuralları
          pnpm config set frozen-lockfile false
          pnpm install --reporter=default
      
      - name: Expo Prebuild (Generate Native iOS Project)
        script: |
          #!/usr/bin/env bash
          # Varsa eski ve bozuk iOS klasörünü tamamen sil
          rm -rf ios
          
          # iOS projesini sıfırdan ve temiz bir şekilde oluştur
          pnpm exec expo prebuild --platform ios --clean --no-install

          
      - name: Build iOS Application (Unsigned)
        script: |
          #!/usr/bin/env bash

          cd ios
          
          # --- YENİ EKLENEN KISIM: Metro Bundler için Node Yolunu ve RAM Sınırını Ayarla ---
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env
          echo "export NODE_BINARY=$(command -v node)" > .xcode.env.local
          export NODE_OPTIONS="--max-old-space-size=4096"
          # ---------------------------------------------------------------------------------
          
          # 1. CocoaPods kurulumunu başlat
          echo "CocoaPods kurulumu başlatılıyor..."
          pod install
          
          # 2. Çalışma alanını otomatik bul (-d parametresi klasörün içine girilmesini engeller)
          WORKSPACE_FILE=$(ls -d *.xcworkspace | head -n 1)
          
          # 3. Uzantıyı atarak scheme adını elde et
          SCHEME_NAME=$(basename "$WORKSPACE_FILE" .xcworkspace)
          
          echo "Bulunan Workspace: $WORKSPACE_FILE"
          echo "Kullanılan Scheme: $SCHEME_NAME"
          
          # 4. Uygulamayı Derle
          xcodebuild -workspace "$WORKSPACE_FILE" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath $HOME/build/UnsignedApp.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            clean archive

      - name: Export IPA (Unsigned)
        script: |
          mkdir -p $CM_EXPORT_DIR
          cp -r $HOME/build/UnsignedApp.xcarchive/Products/Applications/*.app $CM_EXPORT_DIR/
          
    artifacts:
      - $CM_EXPORT_DIR/*.app
