workflows:
  expo-ios-unsigned:
    name: Expo iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1  # Doğru ve geçerli makine tipi olarak güncellendi
    environment:
      node: latest
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:          # 'branches' yerine 'branch_patterns' yapıldı
        - pattern: main         # GitHub ana dalınız master ise burayı master yapın
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm
          
      - name: Install dependencies
        script: |
          pnpm install
      
      - name: Expo Prebuild (Generate Native iOS Project)
        script: |
          pnpm exec expo prebuild --platform ios
          
      - name: Build iOS Application (Unsigned)
        script: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
            -scheme $(xcodebuild -list -json | json Workspace.name 2>/dev/null || echo "Hata: Scheme bulunamadı") \
            -configuration Release \
            -archivePath $HOME/build/UnsignedApp.xcarchive \
            CODE_SIGN_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive
            
      - name: Export IPA (Unsigned)
        script: |
          mkdir -p $CM_EXPORT_DIR
          cp -r $HOME/build/UnsignedApp.xcarchive/Products/Applications/*.app $CM_EXPORT_DIR/
          
    artifacts:
      - $CM_EXPORT_DIR/*.app
